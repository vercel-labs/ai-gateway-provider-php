name: Check Versions

on:
  push:
    branches:
      - main
    paths:
      - 'composer.json'
      - 'plugin.php'
      - 'readme.txt'
      - 'src/Provider/AiGatewayProvider.php'
      - '.github/workflows/check-versions.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'composer.json'
      - 'plugin.php'
      - 'readme.txt'
      - 'src/Provider/AiGatewayProvider.php'
      - '.github/workflows/check-versions.yml'

permissions:
  contents: read

jobs:
  check-versions:
    name: 'Check Versions'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check version consistency
        run: php tools/check-versions.php
