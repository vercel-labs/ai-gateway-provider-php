name: Check Versions

on:
  push:
    branches:
      - main
    paths:
      - 'composer.json'
      - 'plugin.php'
      - 'readme.txt'
      - 'src/Provider/AiGatewayProvider.php'
      - '.github/workflows/check-versions.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'composer.json'
      - 'plugin.php'
      - 'readme.txt'
      - 'src/Provider/AiGatewayProvider.php'
      - '.github/workflows/check-versions.yml'

permissions:
  contents: read

jobs:
  check-versions:
    name: 'Check Versions'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Check version consistency
        run: php tools/check-versions.php
