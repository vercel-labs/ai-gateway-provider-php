name: Check Versions

on:
  push:
    branches:
      - main
    paths:
      - 'composer.json'
      - 'plugin.php'
      - 'readme.txt'
      - 'src/Provider/AiGatewayProvider.php'
      - '.github/workflows/check-versions.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'composer.json'
      - 'plugin.php'
      - 'readme.txt'
      - 'src/Provider/AiGatewayProvider.php'
      - '.github/workflows/check-versions.yml'

permissions:
  contents: read

jobs:
  check-versions:
    name: 'Check Versions'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check version consistency
        run: php tools/check-versions.php
